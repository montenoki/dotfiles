# Sway handles lid switch events via bindswitch + handle-lid.sh
# Without this override, logind's default HandleLidSwitch=suspend races with
# sway's handler, causing unpredictable behavior on lid close.
#
# DEPLOY (requires sudo):
#   sudo mkdir -p /etc/systemd/logind.conf.d
#   sudo cp ~/dotfiles/etc/systemd/logind.conf.d/sway.conf /etc/systemd/logind.conf.d/sway.conf
#
# ACTIVATE:
#   Reboot (preferred)
#   OR: sudo systemctl restart systemd-logind
#   WARNING: restarting systemd-logind may terminate your graphical session!
#   Save all work before running the restart command.

[Login]
HandleLidSwitch=ignore
HandleLidSwitchExternalPower=ignore
HandleLidSwitchDocked=ignore
